<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"
    ></script>
    <style>
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
      }
      canvas {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <canvas id="resize"></canvas>
    <script>
      let modelsLoaded = false;
      let idDescriptor = null;
      let liveDescriptor = null;

      const send = (payload) =>
        window.ReactNativeWebView.postMessage(JSON.stringify(payload));

      function getModelUrl() {
        return window.location.origin + "/face-models";
      }

      const resizeImage = (img, maxDim) => {
        const canvas = document.getElementById("resize");
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas;
      };

      const loadImageFromBase64 = (base64) =>
        new Promise((res, rej) => {
          const img = new Image();
          img.onload = () => res(img);
          img.onerror = rej;
          img.src = base64;
        });

      const cropFaceFromOriginal = (img, src, box, pad) => {
        pad = pad || 40;
        const scaleX = img.width / src.width;
        const scaleY = img.height / src.height;
        const x = Math.max(0, Math.round((box.x - pad) * scaleX));
        const y = Math.max(0, Math.round((box.y - pad) * scaleY));
        const w = Math.min(
          Math.round((box.width + pad * 2) * scaleX),
          img.width - x,
        );
        const h = Math.min(
          Math.round((box.height + pad * 2) * scaleY),
          img.height - y,
        );
        const canvas = document.getElementById("c");
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, x, y, w, h, 0, 0, w, h);
        return canvas.toDataURL("image/jpeg", 0.95);
      };

      const euclidean = (a, b) => {
        let sum = 0;
        for (let i = 0; i < a.length; i++) {
          const d = a[i] - b[i];
          sum += d * d;
        }
        return Math.sqrt(sum);
      };

      // face-api descriptors: same face ≈ 0.3–0.45, different ≈ 0.6–1.0
      // Map distance=0 → 100%, distance=0.6 → 0%
      const distanceToScore = (dist) =>
        Math.max(0, Math.min(1, 1 - dist / 0.6));

      // ── Load models ───────────────────────────────────────────────────────────
      async function loadModels() {
        try {
          const MODEL_URL = getModelUrl();
          send({ type: "debug", message: "Loading models from: " + MODEL_URL });
          send({ type: "progress", value: 5 });
          await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
          send({ type: "progress", value: 30 });
          await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
          send({ type: "progress", value: 65 });
          await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
          send({ type: "progress", value: 90 });
          await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
          send({ type: "progress", value: 100 });
          modelsLoaded = true;
          send({ type: "modelsReady" });
          send({ type: "debug", message: "All models loaded!" });
        } catch (err) {
          send({
            type: "debug",
            message: "Local model error, trying CDN: " + err.message,
          });
          try {
            const CDN =
              "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";
            await faceapi.nets.tinyFaceDetector.loadFromUri(CDN);
            send({ type: "progress", value: 30 });
            await faceapi.nets.faceLandmark68Net.loadFromUri(CDN);
            send({ type: "progress", value: 65 });
            await faceapi.nets.faceRecognitionNet.loadFromUri(CDN);
            send({ type: "progress", value: 90 });
            await faceapi.nets.faceLandmark68TinyNet.loadFromUri(CDN);
            send({ type: "progress", value: 100 });
            modelsLoaded = true;
            send({ type: "modelsReady" });
            send({ type: "debug", message: "CDN fallback succeeded!" });
          } catch (cdnErr) {
            send({
              type: "error",
              context: "models",
              message: "Failed to load models: " + (cdnErr.message || cdnErr),
            });
          }
        }
      }

      // ── Crop face tightly from detected box ──────────────────────────────────
      // Crops from the resized src canvas (not original) to keep coordinates
      // consistent. Padding of 30% of face size gives landmarks room.
      function cropFacePatch(src, box) {
        const pad = Math.round(Math.max(box.width, box.height) * 0.3);
        const x = Math.max(0, Math.round(box.x - pad));
        const y = Math.max(0, Math.round(box.y - pad));
        const w = Math.min(src.width - x, Math.round(box.width + pad * 2));
        const h = Math.min(src.height - y, Math.round(box.height + pad * 2));
        const c = document.getElementById("c");
        c.width = w;
        c.height = h;
        c.getContext("2d").drawImage(src, x, y, w, h, 0, 0, w, h);
        return c;
      }

      // ── Shared: extract descriptor using a fixed pipeline ─────────────────────
      // KEY RULE: both the uploaded photo and the live scan must go through
      // EXACTLY the same steps so their 128-dim vectors are comparable:
      //   1. Resize to 640px max (consistent scale for both portrait and selfie)
      //   2. Detect face at a FIXED inputSize=416 (same CNN scale both times)
      //   3. Crop face patch with padding
      //   4. Re-run detection+landmarks+descriptor on the cropped patch at 224
      //      (small fixed size — face fills the whole image → best alignment)
      async function extractDescriptor(base64, label) {
        const img = await loadImageFromBase64(base64);
        send({
          type: "debug",
          message: label + " image: " + img.width + "x" + img.height,
        });

        // Step 1: resize to 640 — enough detail, consistent across both inputs
        const src = resizeImage(img, 640);
        send({
          type: "debug",
          message: label + " resized to: " + src.width + "x" + src.height,
        });

        // Step 2: detect face at fixed inputSize=416 for both images
        const DETECT_SIZE = 416;
        let det = await faceapi
          .detectSingleFace(
            src,
            new faceapi.TinyFaceDetectorOptions({
              inputSize: DETECT_SIZE,
              scoreThreshold: 0.25,
            }),
          )
          .withFaceLandmarks();

        // Fallback to 320 if 416 misses
        if (!det) {
          det = await faceapi
            .detectSingleFace(
              src,
              new faceapi.TinyFaceDetectorOptions({
                inputSize: 320,
                scoreThreshold: 0.2,
              }),
            )
            .withFaceLandmarks();
        }

        if (!det) {
          send({
            type: "debug",
            message: label + " — no face detected at 416 or 320",
          });
          return null;
        }
        send({
          type: "debug",
          message:
            label +
            " detected score=" +
            det.detection.score.toFixed(3) +
            " box=" +
            JSON.stringify({
              x: Math.round(det.detection.box.x),
              y: Math.round(det.detection.box.y),
              w: Math.round(det.detection.box.width),
              h: Math.round(det.detection.box.height),
            }),
        });

        // Step 3: crop face patch tightly
        const patch = cropFacePatch(src, det.detection.box);
        send({
          type: "debug",
          message: label + " face patch: " + patch.width + "x" + patch.height,
        });

        // Step 4: compute descriptor on the cropped patch at fixed inputSize=224
        // Face fills the full patch → best possible alignment → consistent descriptor
        const detPatch = await faceapi
          .detectSingleFace(
            patch,
            new faceapi.TinyFaceDetectorOptions({
              inputSize: 224,
              scoreThreshold: 0.1,
            }),
          )
          .withFaceLandmarks()
          .withFaceDescriptor();

        if (!detPatch) {
          // Patch detection failed — fall back to descriptor on full resized src
          send({
            type: "debug",
            message:
              label +
              " patch detection failed, falling back to full-frame descriptor",
          });
          const detFull = await faceapi
            .detectSingleFace(
              src,
              new faceapi.TinyFaceDetectorOptions({
                inputSize: DETECT_SIZE,
                scoreThreshold: 0.25,
              }),
            )
            .withFaceLandmarks()
            .withFaceDescriptor();
          if (!detFull) return null;
          send({
            type: "debug",
            message:
              label +
              " fallback descriptor OK score=" +
              detFull.detection.score.toFixed(3),
          });
          return {
            descriptor: Array.from(detFull.descriptor),
            score: detFull.detection.score,
          };
        }

        send({
          type: "debug",
          message:
            label +
            " patch descriptor OK score=" +
            detPatch.detection.score.toFixed(3),
        });
        return {
          descriptor: Array.from(detPatch.descriptor),
          score: det.detection.score,
        };
      }

      // ── Shared: run the distance comparison and send result ───────────────────
      function runVerify(descA, descB) {
        const distance = euclidean(descA, descB);
        const THRESHOLD = 0.5; // tighter threshold — patch-based descriptors are more consistent
        const isMatch = distance < THRESHOLD;
        const matchScore = distanceToScore(distance);
        send({ type: "verifyDone", isMatch, matchScore, distance });
        send({
          type: "debug",
          message:
            "Verify: distance=" +
            distance.toFixed(4) +
            " score=" +
            (matchScore * 100).toFixed(1) +
            "% match=" +
            isMatch,
        });
      }

      // ── Message handler ───────────────────────────────────────────────────────
      window.addEventListener("message", async (event) => {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch {
          return;
        }

        if (msg.action === "loadModels") {
          loadModels();
          return;
        }

        if (!modelsLoaded) {
          send({
            type: "error",
            context: msg.action,
            message: "Models not loaded yet",
          });
          return;
        }

        // ── processIdFace ─────────────────────────────────────────────────────
        // Used for the uploaded 1x1 portrait photo in application.tsx.
        // Routes through the same extractDescriptor pipeline as processLiveFinal
        // so both descriptors are computed identically (same resize, same
        // inputSize, same patch crop) — ensuring comparable embeddings.
        if (msg.action === "processIdFace") {
          try {
            send({ type: "debug", message: "Processing uploaded photo..." });
            const result = await extractDescriptor(msg.base64, "Photo");
            if (!result) {
              send({
                type: "idFaceError",
                message:
                  "No face detected in the uploaded photo. Please use a clear, front-facing photo.",
              });
              return;
            }
            idDescriptor = result.descriptor;
            send({ type: "idFaceDone", confidence: result.score });
            send({
              type: "debug",
              message:
                "Photo descriptor ready! length=" +
                idDescriptor.length +
                " score=" +
                result.score.toFixed(3),
            });
          } catch (err) {
            send({
              type: "idFaceError",
              message: err.message || "Photo processing failed",
            });
          }
          return;
        }

        // ── processLiveFrame ──────────────────────────────────────────────────
        if (msg.action === "processLiveFrame") {
          try {
            const img = await loadImageFromBase64(msg.base64);
            const src = resizeImage(img, 320);
            const det = await faceapi.detectSingleFace(
              src,
              new faceapi.TinyFaceDetectorOptions({
                inputSize: 224,
                scoreThreshold: 0.5,
              }),
            );
            if (!det) {
              send({ type: "liveFrameNoFace" });
              return;
            }
            send({ type: "liveFrameFaceFound", confidence: det.score });
          } catch {
            send({ type: "liveFrameNoFace" });
          }
          return;
        }

        // ── processLiveFinal ──────────────────────────────────────────────────
        if (msg.action === "processLiveFinal") {
          try {
            send({ type: "debug", message: "Processing final live photo..." });
            const result = await extractDescriptor(msg.base64, "Live");
            if (!result) {
              send({
                type: "liveFinalError",
                message:
                  "No face detected. Move closer, improve lighting, and try again.",
              });
              return;
            }
            liveDescriptor = result.descriptor;
            send({ type: "liveFinalDone", confidence: result.score });
            send({
              type: "debug",
              message:
                "Live final done! descriptor length=" +
                liveDescriptor.length +
                " score=" +
                result.score.toFixed(3),
            });
          } catch (err) {
            send({
              type: "liveFinalError",
              message: err.message || "Live face processing failed",
            });
          }
          return;
        }

        // ── verifyWithPhoto ───────────────────────────────────────────────────
        // Called automatically after processLiveFinal succeeds.
        // Receives the uploaded 1x1 photo as base64, extracts its descriptor,
        // then compares it against the cached liveDescriptor.
        // This is the correct direction: live scan = probe, uploaded photo = reference.
        if (msg.action === "verifyWithPhoto") {
          try {
            if (!liveDescriptor) {
              send({
                type: "verifyError",
                message:
                  "Live scan not completed. Please scan your face first.",
              });
              return;
            }
            if (!msg.photoBase64) {
              send({
                type: "verifyError",
                message: "No photo provided for verification.",
              });
              return;
            }

            send({
              type: "debug",
              message:
                "verifyWithPhoto: extracting descriptor from uploaded photo, base64 length=" +
                msg.photoBase64.length,
            });

            const result = await extractDescriptor(msg.photoBase64, "Photo");
            if (!result) {
              send({
                type: "verifyError",
                message:
                  "No face detected in the uploaded photo. Please use a clear, front-facing 1x1 photo.",
              });
              return;
            }

            send({
              type: "debug",
              message:
                "Photo descriptor ready, comparing with live descriptor...",
            });
            runVerify(result.descriptor, liveDescriptor);
          } catch (err) {
            send({
              type: "verifyError",
              message: err.message || "Verification failed",
            });
          }
          return;
        }

        // ── verify (legacy — compares idDescriptor vs liveDescriptor) ─────────
        if (msg.action === "verify") {
          if (!idDescriptor || !liveDescriptor) {
            send({
              type: "verifyError",
              message: "Missing face data. Please redo the steps.",
            });
            return;
          }
          try {
            runVerify(idDescriptor, liveDescriptor);
          } catch (err) {
            send({
              type: "verifyError",
              message: err.message || "Verification failed",
            });
          }
          return;
        }
      });

      window.addEventListener("load", () => send({ type: "webviewReady" }));
    </script>
  </body>
</html>
