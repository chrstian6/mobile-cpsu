<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"
    ></script>
    <style>
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
      }
      canvas {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <canvas id="resize"></canvas>
    <script>
      let modelsLoaded = false;
      let idDescriptor = null;
      let liveDescriptor = null;

      const send = (payload) =>
        window.ReactNativeWebView.postMessage(JSON.stringify(payload));

      function getModelUrl() {
        return window.location.origin + "/face-models";
      }

      const resizeImage = (img, maxDim) => {
        const canvas = document.getElementById("resize");
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas
          .getContext("2d")
          .drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas;
      };

      const loadImageFromBase64 = (base64) =>
        new Promise((res, rej) => {
          const img = new Image();
          img.onload = () => res(img);
          img.onerror = rej;
          img.src = base64;
        });

      const cropFaceToBase64 = (img, box, pad) => {
        pad = pad || 30;
        const canvas = document.getElementById("c");
        const x = Math.max(0, box.x - pad);
        const y = Math.max(0, box.y - pad);
        const w = Math.min(box.width + pad * 2, img.width - x);
        const h = Math.min(box.height + pad * 2, img.height - y);
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, x, y, w, h, 0, 0, w, h);
        return canvas.toDataURL("image/jpeg", 0.95);
      };

      const euclidean = (a, b) => {
        let sum = 0;
        for (let i = 0; i < a.length; i++) {
          const d = a[i] - b[i];
          sum += d * d;
        }
        return Math.sqrt(sum);
      };

      // ── Load models ───────────────────────────────────────────────────────────
      async function loadModels() {
        try {
          const MODEL_URL = getModelUrl();
          send({ type: "debug", message: "Loading models from: " + MODEL_URL });
          send({ type: "progress", value: 5 });

          await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
          send({ type: "progress", value: 40 });
          await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
          send({ type: "progress", value: 75 });
          await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
          send({ type: "progress", value: 100 });

          modelsLoaded = true;
          send({ type: "modelsReady" });
          send({ type: "debug", message: "Models loaded!" });
        } catch (err) {
          send({
            type: "debug",
            message: "Local model error, trying CDN: " + err.message,
          });
          try {
            const CDN =
              "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";
            await faceapi.nets.tinyFaceDetector.loadFromUri(CDN);
            send({ type: "progress", value: 40 });
            await faceapi.nets.faceLandmark68TinyNet.loadFromUri(CDN);
            send({ type: "progress", value: 75 });
            await faceapi.nets.faceRecognitionNet.loadFromUri(CDN);
            send({ type: "progress", value: 100 });
            modelsLoaded = true;
            send({ type: "modelsReady" });
            send({ type: "debug", message: "CDN fallback succeeded!" });
          } catch (cdnErr) {
            send({
              type: "error",
              context: "models",
              message: "Failed to load models: " + (cdnErr.message || cdnErr),
            });
          }
        }
      }

      // ── Message handler ───────────────────────────────────────────────────────
      window.addEventListener("message", async (event) => {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch {
          return;
        }

        if (msg.action === "loadModels") {
          loadModels();
          return;
        }

        if (!modelsLoaded) {
          send({
            type: "error",
            context: msg.action,
            message: "Models not loaded yet",
          });
          return;
        }

        // ── processIdFace ─────────────────────────────────────────────────────
        if (msg.action === "processIdFace") {
          try {
            send({ type: "debug", message: "Processing ID face..." });
            const img = await loadImageFromBase64(msg.base64);
            send({
              type: "debug",
              message: "ID image: " + img.width + "x" + img.height,
            });

            let allFaces = null;
            const sizes = [320, 224, 416, 608];
            for (const size of sizes) {
              const src = resizeImage(img, 800);
              allFaces = await faceapi
                .detectAllFaces(
                  src,
                  new faceapi.TinyFaceDetectorOptions({
                    inputSize: size,
                    scoreThreshold: 0.2,
                  }),
                )
                .withFaceLandmarks(true)
                .withFaceDescriptors();
              send({
                type: "debug",
                message:
                  "Size " +
                  size +
                  ": " +
                  (allFaces ? allFaces.length : 0) +
                  " faces",
              });
              if (allFaces && allFaces.length > 0) break;
            }

            if (!allFaces || allFaces.length === 0) {
              send({
                type: "idFaceError",
                message:
                  "No face detected in ID. Make sure the photo is clear.",
              });
              return;
            }

            const best = allFaces.sort(
              (a, b) =>
                b.detection.box.width * b.detection.box.height -
                a.detection.box.width * a.detection.box.height,
            )[0];

            idDescriptor = Array.from(best.descriptor);

            const src = resizeImage(img, 800);
            const scaleX = img.width / src.width;
            const scaleY = img.height / src.height;

            const cropBase64 = cropFaceToBase64(img, {
              x: best.detection.box.x * scaleX,
              y: best.detection.box.y * scaleY,
              width: best.detection.box.width * scaleX,
              height: best.detection.box.height * scaleY,
            });

            send({
              type: "idFaceDone",
              descriptor: idDescriptor,
              cropBase64,
              confidence: best.detection.score,
            });
            send({
              type: "debug",
              message: "ID face done! score=" + best.detection.score.toFixed(3),
            });
          } catch (err) {
            send({
              type: "idFaceError",
              message: err.message || "ID face processing failed",
            });
          }
          return;
        }

        // ── processLiveFrame (lightweight — detection only, no descriptor) ────
        // Used only for the real-time viewfinder feedback loop.
        // Does NOT set liveDescriptor — that happens in processLiveFinal.
        if (msg.action === "processLiveFrame") {
          try {
            const img = await loadImageFromBase64(msg.base64);
            // Small resize is fine here — we only need detection confidence
            const src = resizeImage(img, 320);
            const det = await faceapi.detectSingleFace(
              src,
              new faceapi.TinyFaceDetectorOptions({
                inputSize: 224,
                scoreThreshold: 0.5,
              }),
            );

            if (!det) {
              send({ type: "liveFrameNoFace" });
              return;
            }
            send({ type: "liveFrameFaceFound", confidence: det.score });
          } catch {
            send({ type: "liveFrameNoFace" });
          }
          return;
        }

        // ── processLiveFinal (high quality — used for the captured photo) ─────
        // Called once after the camera takes the full-res final photo.
        // This is what generates the descriptor used for verification.
        if (msg.action === "processLiveFinal") {
          try {
            send({ type: "debug", message: "Processing final live photo..." });
            const img = await loadImageFromBase64(msg.base64);
            send({
              type: "debug",
              message: "Live photo: " + img.width + "x" + img.height,
            });

            // Use a larger resize and higher inputSize for best descriptor quality
            const src = resizeImage(img, 800);

            let det = null;
            const sizes = [416, 320, 224];
            for (const size of sizes) {
              det = await faceapi
                .detectSingleFace(
                  src,
                  new faceapi.TinyFaceDetectorOptions({
                    inputSize: size,
                    scoreThreshold: 0.4,
                  }),
                )
                .withFaceLandmarks(true)
                .withFaceDescriptor();
              send({
                type: "debug",
                message:
                  "Live final size " +
                  size +
                  ": " +
                  (det
                    ? "found score=" + det.detection.score.toFixed(3)
                    : "not found"),
              });
              if (det) break;
            }

            if (!det) {
              send({
                type: "liveFinalError",
                message:
                  "No face detected in captured photo. Please try again in better lighting.",
              });
              return;
            }

            liveDescriptor = Array.from(det.descriptor);
            send({ type: "liveFinalDone", confidence: det.detection.score });
            send({
              type: "debug",
              message:
                "Live final done! score=" + det.detection.score.toFixed(3),
            });
          } catch (err) {
            send({
              type: "liveFinalError",
              message: err.message || "Live face processing failed",
            });
          }
          return;
        }

        // ── verify ────────────────────────────────────────────────────────────
        if (msg.action === "verify") {
          if (!idDescriptor || !liveDescriptor) {
            send({
              type: "verifyError",
              message: "Missing face data. Please redo the steps.",
            });
            return;
          }
          try {
            const distance = euclidean(idDescriptor, liveDescriptor);
            // Threshold: 0.5 is stricter but more accurate than 0.55
            const isMatch = distance < 0.5;
            const matchScore = Math.max(0, Math.min(1, 1 - distance));
            send({ type: "verifyDone", isMatch, matchScore, distance });
            send({
              type: "debug",
              message:
                "Verify: distance=" + distance.toFixed(4) + " match=" + isMatch,
            });
          } catch (err) {
            send({
              type: "verifyError",
              message: err.message || "Verification failed",
            });
          }
          return;
        }
      });

      window.addEventListener("load", () => send({ type: "webviewReady" }));
    </script>
  </body>
</html>
